"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$time\
$line_break$character"""


[palettes.ivytheme]
color_fg0    = '#bfbdb6'
color_fg1    = '#8a9199'
color_fg2    = '#55616b'
color_bg0    = '#0b0e14'
color_bg1    = '#0f1419'
color_bg2    = '#131721'
color_bg3    = '#1c2129'
color_bg4    = '#252b35'
color_accent = '#e6b450'
color_accent1= '#39bae6'
color_red    = '#f26d78'
color_green  = '#aad94c'
color_yellow = '#e6b450'
color_blue   = '#59c2ff'
color_cyan   = '#95e6cb'

[username]
show_always = true
style_user = "bg:color_bg3 fg:color_fg0"
style_root = "bg:color_bg3 fg:color_fg0"
format = '[{  $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_bg2"
format = "[| $path |]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch |](fg:color_fg0 bg:color_bg1)]($style)'

[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:color_bg1"
format = '[[ $time }](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ ➜](bold fg:color_accent)'
error_symbol = '[ ➜](bold fg:color_red)'
